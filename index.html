<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Mart Pharmacy | Gujar Khan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-teal: #78D1DA; --dark-blue: #3E6CB5; --white: #ffffff; --gray-bg: #f5f9f9; --text-dark: #333; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--gray-bg); margin: 0; padding: 0; color: var(--text-dark); }
        header { background-color: var(--white); padding: 25px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); text-align: center; border-bottom: 5px solid var(--primary-teal); }
        .logo-svg { width: 100px; height: auto; margin-bottom: 10px; }
        .brand-name { font-size: 26px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--dark-blue); margin: 0; }
        .brand-subline { font-size: 16px; color: var(--primary-teal); font-weight: 500; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .menu-grid { display: grid; gap: 20px; margin-top: 10px; }
        .btn-large { background-color: var(--white); border: 2px solid var(--primary-teal); border-radius: 20px; padding: 30px 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
        .btn-large i { font-size: 44px; color: var(--primary-teal); margin-bottom: 15px; }
        .btn-large span { font-size: 18px; font-weight: 600; color: var(--dark-blue); }
        .form-section { display: none; background: var(--white); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left; }
        label { display: block; font-weight: 500; margin-bottom: 8px; color: #555; font-size: 14px; }
        .input-hint { font-size: 12px; color: #888; margin-top: -15px; margin-bottom: 15px; font-style: italic; }
        input, textarea, select { width: 100%; padding: 16px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 12px; font-size: 16px; font-family: inherit; box-sizing: border-box; }
        #address-wrapper { display: none; }
        .submit-btn { background-color: var(--dark-blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .back-btn { background: none; border: none; color: var(--primary-teal); font-weight: 600; cursor: pointer; margin-bottom: 20px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        footer { text-align: center; padding: 30px 20px; color: #777; font-size: 14px; background-color: var(--white); margin-top: 40px; border-top: 1px solid #eee; }
        .required::after { content: "*"; color: #ff4d4d; margin-left: 4px; }
    </style>
</head>
<body>
    <header>
        <svg class="logo-svg" viewBox="0 0 1017 608" xmlns="http://www.w3.org/2000/svg">
            <path d="M312.3 0H704.7C721.2 0 734.7 13.4 734.7 30V159.9C734.7 176.4 721.2 189.9 704.7 189.9H312.3C295.7 189.9 282.3 176.4 282.3 159.9V30C282.3 13.4 295.7 0 312.3 0Z" fill="#78D1DA"/>
            <path d="M508.5 45.4C497.1 45.4 487.8 54.7 487.8 66.1V124C487.8 135.4 497.1 144.7 508.5 144.7H511.5C522.9 144.7 532.2 135.4 532.2 124V66.1C532.2 54.7 522.9 45.4 511.5 45.4H508.5Z" fill="white"/>
            <path d="M584.2 81.3H638.2V135.2H584.2V81.3Z" fill="white"/>
            <path d="M510.6 86.6L533 109M510.6 109L533 86.6" stroke="white" stroke-width="6" stroke-linecap="round"/>
            <path d="M482.7 66.8L505.1 89.2M482.7 89.2L505.1 66.8" stroke="white" stroke-width="6" stroke-linecap="round"/>
            <path d="M510.6 66.8L533 89.2M510.6 89.2L533 66.8" stroke="white" stroke-width="6" stroke-linecap="round"/>
            <path d="M371.3 158.7C371.3 226.5 423 281.4 487.1 281.4C551.2 281.4 602.8 226.5 602.8 158.7H371.3Z" fill="white"/>
            <path d="M508.5 210.5C497.1 210.5 487.8 219.8 487.8 231.2V289.1C487.8 300.5 497.1 309.8 508.5 309.8H511.5C522.9 309.8 532.2 300.5 532.2 289.1V231.2C532.2 219.8 522.9 210.5 511.5 210.5H508.5Z" fill="#3E6CB5"/>
            <path d="M374.3 282.6C374.3 350.4 425.9 405.3 490.1 405.3C554.1 405.3 605.8 350.4 605.8 282.6H374.3Z" fill="#78D1DA"/>
            <path d="M371.3 158.7H602.8C602.8 226.5 551.2 281.4 487.1 281.4C423 281.4 371.3 226.5 371.3 158.7Z" fill="white"/>
            <path d="M309.3 274.6H707.7C724.2 274.6 737.7 288 737.7 304.6V562.6C737.7 579.1 724.2 592.6 707.7 592.6H309.3C292.8 592.6 279.3 579.1 279.3 562.6V304.6C279.3 288 292.8 274.6 309.3 274.6Z" fill="#78D1DA"/>
            <path d="M490.1 292.3V405.3C554.1 405.3 605.8 350.4 605.8 282.6H490.1V292.3Z" fill="#3E6CB5"/>
            <path d="M482.7 329.5V363.4" stroke="white" stroke-width="8" stroke-linecap="round"/>
            <path d="M465.7 346.5H499.6" stroke="white" stroke-width="8" stroke-linecap="round"/>
            <path d="M407.7 274.6L299.8 592.6" stroke="white" stroke-width="12" stroke-linecap="round"/>
            <path d="M313.1 536.8L370.4 564.1C387.8 572.4 408.2 572.2 425.4 563.6C466.8 543 516.1 528.2 568.1 528.2V528.2C611.8 528.2 653.6 539.1 690.4 558.8C701.3 564.6 714.4 562 722.1 552.5L749.5 519.1" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="brand-name">Health Mart</div>
        <div class="brand-subline">Pharmacy</div>
    </header>
    <div class="container">
        <div id="home-screen" class="menu-grid">
            <div class="btn-large" onclick="showForm('order-form')">
                <i class="fas fa-pills"></i><span>Order Medicines</span>
            </div>
            <div class="btn-large" onclick="showForm('upload-form')">
                <i class="fas fa-file-prescription"></i><span>Upload Prescription</span>
            </div>
            <a href="https://wa.me/923055047345" class="btn-large" target="_blank">
                <i class="fab fa-whatsapp" style="color: #25D366;"></i><span>WhatsApp Pharmacy</span>
            </a>
            <a href="tel:03055047345" class="btn-large">
                <i class="fas fa-phone-alt"></i><span>Call Us Now</span>
            </a>
        </div>
        <div id="order-form" class="form-section">
            <button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button>
            <h3>Order Details</h3>
            <label class="required">Full Name</label>
            <input type="text" id="cust-name" placeholder="Enter name">
            <label class="required">Phone Number</label>
            <input type="tel" id="cust-phone" placeholder="03055047345">
            <label class="required">Medicine Name(s)</label>
            <textarea id="med-list" rows="3" placeholder="e.g. Panadol, Arinac"></textarea>
            <label class="required">Quantity (No. of Tablets)</label>
            <div class="input-hint">Enter total individual tablets required.</div>
            <input type="text" id="med-qty" placeholder="e.g. 10 tablets">
            <label class="required">Receive Option</label>
            <select id="delivery-type" onchange="toggleAddressField(this.value)">
                <option value="Store Pickup">Store Pickup</option>
                <option value="Home Delivery">Home Delivery</option>
            </select>
            <div id="address-wrapper">
                <label class="required">Delivery Address</label>
                <textarea id="cust-address" rows="3" placeholder="Enter full address in Gujar Khan"></textarea>
            </div>
            <button class="submit-btn" onclick="sendOrder()">Submit Order</button>
        </div>
        <div id="upload-form" class="form-section">
            <button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button>
            <h3>Upload Prescription</h3>
            <div class="upload-box"><i class="fas fa-camera"></i><p>Take a photo of prescription</p></div>
            <input type="file" id="rx-file" accept="image/*" capture="camera">
            <label>Additional Note</label>
            <textarea id="rx-note" rows="3"></textarea>
            <button class="submit-btn" onclick="sendPrescription()">Submit</button>
        </div>
    </div>
    <footer>
        <div class="contact-info">0305-5047345</div>
        <div>Shop 4, Near Sarwar Shaheed College, Gujar Khan</div>
    </footer>
    <script>
        function showForm(id) { document.getElementById('home-screen').style.display = 'none'; document.getElementById(id).style.display = 'block'; window.scrollTo(0,0); }
        function showHome() { const forms = document.getElementsByClassName('form-section'); for(let form of forms) { form.style.display = 'none'; } document.getElementById('home-screen').style.display = 'grid'; }
        function toggleAddressField(val) { document.getElementById('address-wrapper').style.display = (val === 'Home Delivery') ? 'block' : 'none'; }
        async function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const meds = document.getElementById('med-list').value;
            const qty = document.getElementById('med-qty').value;
            const type = document.getElementById('delivery-type').value;
            const address = document.getElementById('cust-address').value;
            if (!name || !phone || !meds || !qty || (type === 'Home Delivery' && !address)) { alert("Please fill all required fields."); return; }
            const scriptURL = 'https://script.google.com/macros/s/AKfycbyTcrW1ScJgdyZjl6XH5aXmlR7C1TQbb2_KSjLv6Gt25XkeHoeQjb3ElMv-J16SNjw-/exec'; 
            try { fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name, phone, order: meds + " (Qty: " + qty + ")", type, address: address || 'Pickup' }) }); } catch (e) {}
            const msg = `*New Order: Health Mart*%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Medicine:* ${meds}%0A*Tablet Qty:* ${qty}%0A*Type:* ${type}%0A*Address:* ${address || 'Pickup'}`;
            window.open(`https://wa.me/923055047345?text=${msg}`, '_blank');
        }
        function sendPrescription() {
            const note = document.getElementById('rx-note').value;
            const msg = `*Prescription Upload: Health Mart*%0ANote: ${note}%0A(Please send the photo now)`;
            window.open(`https://wa.me/923055047345?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
