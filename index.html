<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vitality | Premium Pharmacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-main: #0D9488;
            --brand-secondary: #3E6CB5;
            --bg-light: #F8FAFC;
            --white: #ffffff;
            --text-dark: #0F172A;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding-bottom: 100px;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            padding: 50px 24px 30px;
            background: linear-gradient(135deg, #0f766e, var(--brand-main));
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            color: white;
            box-shadow: 0 10px 30px rgba(13, 148, 136, 0.1);
        }

        .welcome-msg h2 { font-size: 24px; font-weight: 800; margin: 0; }
        .welcome-msg p { opacity: 0.8; font-size: 14px; margin-top: 5px; }

        .container { padding: 24px; max-width: 500px; margin: 0 auto; }

        /* DASHBOARD CARDS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: -40px; }
        
        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            height: 140px;
            justify-content: space-between;
        }

        .card:active { transform: scale(0.95); background: #f1f5f9; }
        .card i { font-size: 22px; color: var(--brand-main); }
        .card b { font-size: 15px; display: block; margin-top: 10px; }
        .card span { font-size: 11px; color: #64748B; }

        /* FORM OVERLAYS */
        .page-view { display: none; animation: slideUp 0.4s ease; background: var(--bg-light); min-height: 100vh; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h3 { font-size: 20px; font-weight: 800; color: var(--brand-main); margin-bottom: 20px; }
        
        input { 
            width: 100%; padding: 16px; border-radius: 16px; border: 1.5px solid #E2E8F0; 
            margin-bottom: 15px; background: white; font-size: 15px; outline: none;
        }
        
        .btn-main {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: var(--brand-main); color: white; font-weight: 700; font-size: 16px;
        }

        /* ORDER HISTORY STYLING */
        .history-item {
            background: white; padding: 18px; border-radius: 20px; margin-bottom: 12px;
            border: 1px solid #E2E8F0;
        }
        .status-pill {
            display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 10px;
            font-weight: 800; text-transform: uppercase; background: #f1f5f9;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            height: 75px; border-radius: 25px; display: flex; justify-content: space-around;
            align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000;
        }

        .nav-item { text-align: center; text-decoration: none; color: #94A3B8; font-weight: 700; font-size: 10px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--brand-main); }

        .btn-back { background: none; border: none; color: var(--brand-main); font-weight: 700; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>

                <h2 id="greeting">Good Morning</h2>
                <p>Welcome to Vitality Pharmacy</p>
            </div>
        </header>

                    <i class="fas fa-shopping-basket"></i>
                    <div><b>Buy Medicine</b><span>Quick Order</span></div>
                </a>
