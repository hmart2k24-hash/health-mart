<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Mart Pharmacy | Gujar Khan</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-teal: #78D1DA; --dark-blue: #3E6CB5; --white: #ffffff; --gray-bg: #f5f9f9; --text-dark: #333; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--gray-bg); margin: 0; padding: 0; color: var(--text-dark); }
        
        /* Fixed Header & Logo Styling */
        header { 
            background-color: var(--white); 
            padding: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); 
            text-align: center; 
            border-bottom: 5px solid var(--primary-teal); 
        }
        .header-logo {
            width: 180px; /* Adjust size to fit your logo perfectly */
            height: auto;
            margin-bottom: 5px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .brand-name { font-size: 24px; font-weight: 700; color: var(--dark-blue); margin: 0; text-transform: uppercase; }
        .brand-subline { font-size: 14px; color: var(--primary-teal); font-weight: 500; margin: 0; letter-spacing: 1px; }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .menu-grid { display: grid; gap: 20px; margin-top: 10px; }
        .btn-large { background-color: var(--white); border: 2px solid var(--primary-teal); border-radius: 20px; padding: 30px 20px; text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.03); text-align: center; }
        .btn-large i { font-size: 40px; color: var(--primary-teal); margin-bottom: 12px; }
        .btn-large span { font-size: 17px; font-weight: 600; color: var(--dark-blue); }

        .form-section { display: none; background: var(--white); padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark-blue); font-size: 14px; }
        input, textarea, select { width: 100%; padding: 16px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 12px; font-size: 15px; font-family: inherit; box-sizing: border-box; }
        
        /* Multiple Medicine Styling */
        .med-item { background: #fcfdfd; border: 1px solid #e0f2f2; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .add-more-btn { background: none; border: 2px dashed var(--primary-teal); color: var(--dark-blue); padding: 12px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        
        #address-wrapper { display: none; }
        .submit-btn { background-color: var(--dark-blue); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .back-btn { background: none; border: none; color: var(--primary-teal); font-weight: 600; cursor: pointer; margin-bottom: 20px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        footer { text-align: center; padding: 30px 20px; color: #777; font-size: 13px; margin-top: 20px; }
        .required::after { content: "*"; color: #ff4d4d; margin-left: 4px; }
    </style>
</head>
<body>

    <header>
        <img src="image.png" alt="Health Mart Logo" class="header-logo">
        <div class="brand-name">Health Mart</div>
        <div class="brand-subline">Pharmacy</div>
    </header>

    <div class="container">
        <div id="home-screen" class="menu-grid">
            <div class="btn-large" onclick="showForm('order-form')">
                <i class="fas fa-pills"></i><span>Order Medicines</span>
            </div>
            <div class="btn-large" onclick="showForm('upload-form')">
                <i class="fas fa-camera"></i><span>Send Prescription</span>
            </div>
            <a href="https://wa.me/923055047345" class="btn-large" target="_blank">
                <i class="fab fa-whatsapp" style="color: #25D366;"></i><span>WhatsApp Chat</span>
            </a>
            <a href="tel:03055047345" class="btn-large">
                <i class="fas fa-phone-alt"></i><span>Call Us Now</span>
            </a>
        </div>

        <div id="order-form" class="form-section">
            <button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button>
            <h3>Order Details</h3>
            
            <label class="required">Full Name</label>
            <input type="text" id="cust-name" placeholder="Enter your name">
            
            <label class="required">Phone Number</label>
            <input type="tel" id="cust-phone" placeholder="03055047345">
            
            <div id="medicine-container">
                <div class="med-item">
                    <label class="required">Medicine Name</label>
                    <input type="text" class="med-name" placeholder="e.g. Panadol">
                    <label class="required">Quantity (No. of Tablets)</label>
                    <input type="text" class="med-qty" placeholder="e.g. 10 tablets">
                </div>
            </div>
            <button class="add-more-btn" onclick="addMedicineField()">+ Add Another Medicine</button>

            <label class="required">Receive Option</label>
            <select id="delivery-type" onchange="toggleAddressField(this.value)">
                <option value="Store Pickup">Store Pickup</option>
                <option value="Home Delivery">Home Delivery</option>
            </select>
            
            <div id="address-wrapper">
                <label class="required">Delivery Address</label>
                <textarea id="cust-address" rows="3" placeholder="Full address in Gujar Khan"></textarea>
            </div>
            
            <button class="submit-btn" onclick="sendOrder()">Submit Order</button>
        </div>

        <div id="upload-form" class="form-section">
            <button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button>
            <div style="text-align:center;">
                <i class="fas fa-file-medical" style="font-size: 60px; color: var(--primary-teal); margin-bottom: 20px;"></i>
                <p style="color:#555; line-height: 1.6;">Click below to open WhatsApp. <br>Then, take a photo of your prescription and send it to us.</p>
                <button class="submit-btn" style="background-color: #25D366; margin-top:20px;" onclick="sendPrescription()">
                    <i class="fab fa-whatsapp"></i> Take Photo & Send
                </button>
            </div>
        </div>
    </div>

    <footer>0305-5047345 | Shop 4, Near Sarwar Shaheed College, Gujar Khan</footer>

    <script>
        function showForm(id) { document.getElementById('home-screen').style.display = 'none'; document.getElementById(id).style.display = 'block'; window.scrollTo(0,0); }
        function showHome() { const forms = document.getElementsByClassName('form-section'); for(let form of forms) { form.style.display = 'none'; } document.getElementById('home-screen').style.display = 'grid'; }
        function toggleAddressField(val) { document.getElementById('address-wrapper').style.display = (val === 'Home Delivery') ? 'block' : 'none'; }
        
        // Dynamic Medicine Fields
        function addMedicineField() {
            const container = document.getElementById('medicine-container');
            const div = document.createElement('div');
            div.className = 'med-item';
            div.innerHTML = `<label class="required">Medicine Name</label><input type="text" class="med-name" placeholder="e.g. Arinac"><label class="required">Quantity (No. of Tablets)</label><input type="text" class="med-qty" placeholder="e.g. 5 tablets">`;
            container.appendChild(div);
        }

        async function sendOrder() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const type = document.getElementById('delivery-type').value;
            const address = document.getElementById('cust-address').value;
            const names = document.querySelectorAll('.med-name');
            const qties = document.querySelectorAll('.med-qty');
            
            let orderList = [];
            let waString = "";
            names.forEach((n, i) => {
                if(n.value && qties[i].value) {
                    orderList.push(`${n.value} (${qties[i].value})`);
                    waString += `• ${n.value}: ${qties[i].value}%0A`;
                }
            });

            if (!name || !phone || orderList.length === 0 || (type === 'Home Delivery' && !address)) {
                alert("Please fill all required fields."); return;
            }

            const scriptURL = 'https://script.google.com/macros/s/AKfycbyTcrW1ScJgdyZjl6XH5aXmlR7C1TQbb2_KSjLv6Gt25XkeHoeQjb3ElMv-J16SNjw-/exec'; 
            const finalAddress = (type === "Home Delivery") ? address : "";

            // 1. Submit to Google Sheet
            try {
                fetch(scriptURL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ name, phone, order: orderList.join(", "), type, address: finalAddress })
                });
            } catch (e) { console.error("Sheet Error:", e); }

            // 2. Open WhatsApp
            const msg = `*New Order: Health Mart*%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Type:* ${type}%0A*Address:* ${finalAddress || 'N/A (Store Pickup)'}%0A*Order:*%0A${waString}`;
            window.open(`https://wa.me/923055047345?text=${msg}`, '_blank');
        }

        function sendPrescription() {
            const msg = "*Prescription Order: Health Mart*%0A(I am sending the photo of my prescription below)";
            window.open(`https://wa.me/923055047345?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
