<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Mart | Digital Pharmacy</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Health Mart">
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #78D1DA; --secondary: #3E6CB5; --bg: #f4f7f8; --white: #ffffff; }
        
        /* Flexbox Body to keep footer at bottom */
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333; 
        }

        header { 
            background: var(--white); padding: 25px 20px; text-align: center; 
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        .header-logo { width: 140px; height: auto; }
        
        /* Container grows to push footer down */
        .container { 
            max-width: 450px; 
            margin: 0 auto; 
            padding: 20px;
            flex-grow: 1; 
            width: 100%;
            box-sizing: border-box;
        }

        .card { background: var(--white); border-radius: 24px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-decoration: none; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(0,0,0,0.06); }
        .card-icon { width: 45px; height: 45px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .icon-blue { background: #eef4ff; color: var(--secondary); }
        .icon-gold { background: #fff8e1; color: #fbc02d; }
        .icon-teal { background: #e0f7f9; color: #008b8b; }
        .icon-green { background: #e8f9ef; color: #25D366; }

        .card-text b { display: block; font-size: 15px; color: #222; }
        .card-text span { font-size: 11px; color: #888; }

        /* Fixed Footer Text Alignment */
        .footer-text {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            font-weight: 500;
            letter-spacing: 1px;
            padding: 20px 0 120px 0; /* Extra bottom padding for navigation bar */
            text-transform: uppercase;
        }

        .form-section { display: none; background: var(--white); padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        label { display: block; font-size: 11px; font-weight: 700; color: #aaa; margin-bottom: 8px; text-transform: uppercase; }
        .required::after { content: " *"; color: #ff4d4d; }
        
        input, select, textarea { width: 100%; padding: 14px; border: 1.5px solid #f0f0f0; border-radius: 12px; margin-bottom: 12px; font-size: 14px; box-sizing: border-box; background: #fafafa; font-family: inherit; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); display: flex; justify-content: space-around; padding: 12px; border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-link { text-align: center; text-decoration: none; color: #bbb; font-size: 10px; font-weight: 600; }
        .nav-link i { font-size: 18px; display: block; margin-bottom: 3px; }
        .nav-link.active { color: var(--secondary); }
    </style>
</head>
<body>

<header>
    <img src="image.png.png" alt="Health Mart Logo" class="header-logo">
</header>

<div class="container">
    <div id="home-screen">
        <div class="card" onclick="showForm('order-form')">
            <div class="card-icon icon-blue"><i class="fas fa-shopping-basket"></i></div>
            <div class="card-text"><b>Buy Medicines</b><span>Fast checkout for your medicines</span></div>
        </div>
        
        <div class="card" onclick="showForm('sub-form')">
            <div class="card-icon icon-gold"><i class="fas fa-crown"></i></div>
            <div class="card-text"><b>Medicine Subscription</b><span>VIP: Free delivery & refills</span></div>
        </div>

        <div class="card" onclick="showForm('upload-form')">
            <div class="card-icon icon-teal"><i class="fas fa-camera"></i></div>
            <div class="card-text"><b>Send Prescription</b><span>Quick photo upload</span></div>
        </div>
        
        <a href="https://wa.me/923055047345?text=*CONSULTANCY REQUEST: HEALTH MART*" class="card" style="text-decoration:none;">
            <div class="card-icon icon-green"><i class="fas fa-user-md"></i></div>
            <div class="card-text"><b>For Consultancy</b><span>Expert advice from our pharmacist</span></div>
        </a>
    </div>

    <div class="footer-text">HEALTH MART PHARMACY • GUJAR KHAN</div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-link active" onclick="showHome()"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="tel:03055047345" class="nav-link"><i class="fas fa-phone-alt"></i><span>Call</span></a>
    <a href="https://wa.me/923055047345" class="nav-link"><i class="fab fa-whatsapp"></i><span>Chat</span></a>
</div>

<script>
    function showForm(id) { document.getElementById('home-screen').style.display = 'none'; document.getElementById(id).style.display = 'block'; window.scrollTo(0,0); }
    function showHome() { const sections = document.querySelectorAll('.form-section'); sections.forEach(s => s.style.display = 'none'); document.getElementById('home-screen').style.display = 'block'; }
    // Add rest of your existing JS logic here
</script>

</body>
</html>
