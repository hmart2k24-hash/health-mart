<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Mart | Premium Pharmacy</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-main: #0D9488;
            --brand-sec: #3E6CB5;
            --bg-light: #F8FAFC;
            --white: #ffffff;
            --text-dark: #0F172A;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            padding-bottom: 120px;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PREMIUM HEADER */
        header {
            width: 100%;
            padding: 60px 24px 80px;
            background: linear-gradient(135deg, #0f766e, var(--brand-main));
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            color: white;
            box-sizing: border-box;
        }

        .header-content { max-width: 500px; margin: 0 auto; width: 100%; }
        header h2 { font-size: 26px; font-weight: 800; margin: 0; }
        header p { opacity: 0.8; font-size: 14px; margin-top: 5px; }

        .container { 
            width: 100%; 
            max-width: 500px; 
            padding: 0 20px; 
            box-sizing: border-box; 
            margin-top: -40px; 
        }

        /* GRID SYSTEM */
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        
        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
            border: 1px solid rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 150px;
        }

        .card:active { transform: scale(0.95); }
        .card i { font-size: 22px; color: var(--brand-main); background: #f0fdfa; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 14px; }
        .card b { font-size: 15px; display: block; margin-top: 12px; font-weight: 700; }
        .card span { font-size: 11px; color: #64748B; line-height: 1.3; }

        /* FORM OVERLAYS */
        .page-view { display: none; background: var(--white); border-radius: 30px; padding: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        h3 { font-size: 20px; font-weight: 800; color: var(--brand-main); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 15px; border-radius: 15px; border: 1.5px solid #E2E8F0; margin-bottom: 12px; background: #F8FAFC; font-family: inherit; font-size: 14px; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--brand-main); color: white; font-weight: 700; font-size: 16px; cursor: pointer; }
        .btn-back { background: none; border: none; color: #94A3B8; font-weight: 700; margin-bottom: 15px; cursor: pointer; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 20px; width: 90%; max-width: 450px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
            height: 75px; border-radius: 25px; display: flex; justify-content: space-around;
            align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 1000;
        }

        .nav-item { text-align: center; text-decoration: none; color: #94A3B8; font-weight: 700; font-size: 10px; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--brand-main); }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-content">
            <h2 id="greet">Good Morning</h2>
            <p>Welcome to Health Mart Pharmacy</p>
        </div>
    </header>

    <div class="container">
        <div id="home-screen" class="grid">
            <a href="#" class="card" onclick="showPage('order-page')">
                <i class="fas fa-shopping-basket"></i>
                <div><b>Buy Medicine</b><span>Quick Order Delivery</span></div>
            </a>
            <a href="#" class="card" onclick="showPage('account-page')">
                <i class="fas fa-user-circle"></i>
                <div><b>Order History</b><span>Track your orders</span></div>
            </a>
            <a href="https://wa.me/923055047345?text=*CONSULTANCY*" class="card">
                <i class="fas fa-user-md"></i>
                <div><b>Consultancy</b><span>Chat with Pharmacist</span></div>
            </a>
            <a href="https://wa.me/923055047345?text=*PRESCRIPTION*" class="card">
                <i class="fas fa-camera"></i>
                <div><b>Prescription</b><span>Upload via WhatsApp</span></div>
            </a>
        </div>

        <div id="order-page" class="page-view">
            <button class="btn-back" onclick="showHome()"><i class="fas fa-arrow-left"></i> Home</button>
            <h3>New Order</h3>
            <input type="text" id="name" placeholder="Your Full Name">
            <input type="tel" id="phone" placeholder="WhatsApp Number">
            <textarea id="meds" rows="3" placeholder="Medicine Names & Quantities"></textarea>
            <button class="btn-main" onclick="processOrder()">Confirm via WhatsApp</button>
        </div>

        <div id="account-page" class="page-view">
            <button class="btn-back" onclick="showHome()"><i class="fas fa-arrow-left"></i> Home</button>
            <h3>My Orders</h3>
            <div id="login-box">
                <p style="font-size:12px; color:#64748B; margin-bottom:15px;">Enter your phone number to check your history.</p>
                <input type="tel" id="lookup-phone" placeholder="03XXXXXXXXX">
                <button class="btn-main" onclick="fetchHistory()">View History</button>
            </div>
            <div id="history-display" style="display:none;">
                <div id="history-content"></div>
            </div>
        </div>
    </div>
