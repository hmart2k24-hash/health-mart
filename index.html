<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Mart Pharmacy</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #78D1DA; --secondary: #3E6CB5; --bg: #f4f7f8; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 120px; color: #333; }
        
        header { background: var(--white); padding: 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-logo { width: 100px; height: auto; margin-bottom: 5px; }
        .pharmacy-title { display: block; font-size: 18px; font-weight: 700; color: var(--secondary); }
        
        .container { max-width: 450px; margin: 0 auto; padding: 20px; width: 100%; box-sizing: border-box; }

        .card { background: var(--white); border-radius: 24px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-decoration: none; color: inherit; }
        .card-icon { width: 45px; height: 45px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .icon-blue { background: #eef4ff; color: var(--secondary); }
        .icon-teal { background: #e0f7f9; color: #008b8b; }
        .icon-green { background: #e8f9ef; color: #25D366; }
        .icon-purple { background: #f3e5f5; color: #9c27b0; }
        .card-text b { display: block; font-size: 15px; color: #222; }
        .card-text span { font-size: 11px; color: #888; }

        .page-view { display: none; background: var(--white); padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        h3 { font-size: 18px; color: var(--secondary); margin-bottom: 20px; text-align: center; }
        label { display: block; font-size: 11px; font-weight: 700; color: #aaa; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 1.5px solid #f0f0f0; border-radius: 12px; margin-bottom: 12px; font-size: 14px; box-sizing: border-box; background: #fafafa; font-family: inherit; }
        
        .med-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-add { background: none; border: 1.5px dashed var(--primary); color: var(--secondary); width: 100%; padding: 10px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 15px; font-size: 12px; }
        .btn-main { background: var(--secondary); color: white; padding: 18px; width: 100%; border: none; border-radius: 18px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .btn-back { border: none; background: none; color: #94A3B8; font-weight: 600; margin-bottom: 15px; cursor: pointer; }

        .history-item { background: #ffffff; padding: 16px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #f0f0f0; text-align: left; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .history-date { font-size: 11px; color: #94A3B8; font-weight: 600; }
        .history-status { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px; text-transform: uppercase; }
        .status-pending { background: #FFF7ED; color: #C2410C; }
        .status-completed { background: #F0FDF4; color: #15803D; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); display: flex; justify-content: space-around; padding: 12px 0 25px 0; border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-link { text-align: center; text-decoration: none; color: #bbb; font-size: 10px; font-weight: 600; flex: 1; }
    </style>
</head>
<body>

<header>
    <img src="favicon.png" alt="Health Mart Logo" class="header-logo">
    <span class="pharmacy-title">Health Mart Pharmacy</span>
</header>

<div class="container">
    <div id="home-screen">
        <div class="card" onclick="openPage('order-page')">
            <div class="card-icon icon-blue"><i class="fas fa-shopping-basket"></i></div>
            <div class="card-text"><b>Buy Medicines</b><span>Fast checkout</span></div>
        </div>
        <div class="card" onclick="window.location.href='https://wa.me/923055047345?text=*PRESCRIPTION*'">
            <div class="card-icon icon-teal"><i class="fas fa-camera"></i></div>
            <div class="card-text"><b>Send Prescription</b><span>Photo upload</span></div>
        </div>
        <div class="card" onclick="openPage('history-page')">
            <div class="card-icon icon-purple"><i class="fas fa-history"></i></div>
            <div class="card-text"><b>Order History</b><span>Track status</span></div>
        </div>
        <a href="https://wa.me/923055047345?text=*CONSULTANCY*" class="card">
            <div class="card-icon icon-green"><i class="fas fa-user-md"></i></div>
            <div class="card-text"><b>For Consultancy</b><span>Expert advice</span></div>
        </a>
    </div>

    <div id="order-page" class="page-view">
        <button class="btn-back" onclick="goHome()"><i class="fas fa-arrow-left"></i> Home</button>
        <h3>Place Order</h3>
        <label>Name</label><input type="text" id="cust-name">
        <label>WhatsApp</label><input type="tel" id="cust-phone">
        <label>Medicines</label>
        <div id="med-list">
            <div class="med-row"><input type="text" class="m-name" placeholder="Medicine" style="flex:2;"><input type="text" class="m-qty" placeholder="Qty" style="flex:1;"></div>
        </div>
        <button class="btn-add" onclick="addMedRow()">+ Add Medicine</button>
        <label>Delivery</label>
        <select id="del-type" onchange="document.getElementById('addr-box').style.display=(this.value=='Home Delivery'?'block':'none')">
            <option value="Pickup">Pickup</option>
            <option value="Home Delivery">Home Delivery</option>
        </select>
        <div id="addr-box" style="display:none;"><label>Address</label><textarea id="cust-addr" rows="2"></textarea></div>
        <button class="btn-main" onclick="sendOrder()">Confirm Order</button>
    </div>

    <div id="history-page" class="page-view">
        <button class="btn-back" onclick="goHome()"><i class="fas fa-arrow-left"></i> Home</button>
        <h3>My Account</h3>
        <input type="tel" id="log-phone" placeholder="Enter WhatsApp Number">
        <button class="btn-main" id="log-btn" onclick="getHistory()">View History</button>
        <div id="res-box" style="margin-top:20px;"></div>
    </div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-link" onclick="goHome()" style="color:var(--secondary)"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="tel:03055047345" class="nav-link"><i class="fas fa-phone-alt"></i><span>Call</span></a>
    <a href="https://wa.me/923055047345" class="nav-link"><i class="fab fa-whatsapp"></i><span>Chat</span></a>
</div>

<script>
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRSt4vVaf_6Duc3LMr61oCqBo5MGOnbUDWFUDXKsczQ5Kt4X8-G8Z5_b_qJLcUUpA/exec';

    function openPage(id) {
        document.getElementById('home-screen').style.display = 'none';
        var views = document.querySelectorAll('.page-view');
        for(var i=0; i<views.length; i++) { views[i].style.display = 'none'; }
        document.getElementById(id).style.display = 'block';
    }

    function goHome() {
        var views = document.querySelectorAll('.page-view');
        for(var i=0; i<views.length; i++) { views[i].style.display = 'none'; }
        document.getElementById('home-screen').style.display = 'block';
    }

    function addMedRow() {
        var div = document.createElement('div'); div.className = 'med-row';
        div.innerHTML = '<input type="text" class="m-name" placeholder="Medicine" style="flex:2;"><input type="text" class="m-qty" placeholder="Qty" style="flex:1;">';
        document.getElementById('med-list').appendChild(div);
    }

    function getHistory() {
        var ph = document.getElementById('log-phone').value;
        if(!ph) return alert("Enter Phone Number");
        document.getElementById('log-btn').innerText = "Loading...";
        
        fetch(SCRIPT_URL + '?phone=' + ph)
        .then(function(res){ return res.json(); })
        .then(function(d){
            if(d.success) {
                var h = '<p style="font-weight:700;">Welcome, ' + d.name + '</p>';
                d.history.forEach(function(o){
                    var sCls = (o.status||'').toLowerCase()==='completed'?'status-completed':'status-pending';
                    var cleanM = o.items.split('(Qty:')[0].trim();
                    var rawQ = o.items.includes('(Qty:') ? o.items.split('(Qty:')[1].split(')')[0] : '';
                    var cleanQ = rawQ.split('GMT')[0].split('2026')[0].trim();
                    h += '<div class="history-item"><div class="history-header"><span class="history-date">'+o.date+'</span><span class="history-status '+sCls+'">'+(o.status||'Pending')+'</span></div><p style="font-weight:700;margin:0;">'+cleanM+'</p><div style="font-size:12px;color:#666;">Qty: '+cleanQ+'</div></div>';
                });
                document.getElementById('res-box').innerHTML = h;
            } else { alert("Not Found"); }
            document.getElementById('log-btn').innerText = "View History";
        }).catch(function(){ alert("Error"); document.getElementById('log-btn').innerText = "View History"; });
    }

    function sendOrder() {
        var n = document.getElementById('cust-name').value;
        var p = document.getElementById('cust-phone').value;
        var dt = document.getElementById('del-type').value;
        var ad = document.getElementById('cust-addr').value;
        var wa = "", ml = "", ql = "";
        document.querySelectorAll('.med-row').forEach(function(r){
            var m = r.querySelector('.m-name').value; var q = r.querySelector('.m-qty').value;
            if(m) { wa += '• ' + m + ': ' + q + '%0A'; ml += m + ', '; ql += q + ', '; }
        });
        if(!n || !p || !ml) return alert("Fill all fields");
        fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({ name:n, phone:p, order:ml, qty:ql, type:dt, address:ad||'Pickup' })});
        window.location.href = "https://wa.me/923055047345?text=*NEW ORDER*%0A*Name:* "+n+"%0A*Items:*%0A"+wa;
    }
</script>
</body>
</html>
