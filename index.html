<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Health Mart Pharmacy | Online</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #78D1DA; 
            --secondary: #3E6CB5; 
            --bg: #f4f7f8; 
            --white: #ffffff; 
            --text: #2c3e50;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; padding-bottom: 120px; color: var(--text); overflow-x: hidden; }
        
        /* PREMIUM HEADER */
        header { 
            background: var(--white); 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom-left-radius: 35px; 
            border-bottom-right-radius: 35px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(120, 209, 218, 0.2);
        }
        .header-logo { width: 110px; height: auto; margin-bottom: 8px; }
        .pharmacy-title { display: block; font-size: 20px; font-weight: 700; color: var(--secondary); letter-spacing: 0.5px; }
        .welcome-msg { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; display: block; }

        .container { max-width: 450px; margin: 0 auto; padding: 25px 20px; width: 100%; box-sizing: border-box; }

        /* ANIMATED CARDS */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card { 
            background: var(--white); 
            border-radius: 26px; 
            padding: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 18px; 
            cursor: pointer; 
            border: 1px solid rgba(0,0,0,0.01); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); 
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
            transition: 0.3s;
        }
        .card:active { transform: scale(0.96); background: #fcfcfc; }

        /* Delayed animation timing */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }

        .card-icon { width: 52px; height: 52px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .icon-blue { background: #eef4ff; color: var(--secondary); }
        .icon-gold { background: #fff8e1; color: #fbc02d; }
        .icon-teal { background: #e0f7f9; color: #008b8b; }
        .icon-green { background: #e8f9ef; color: #25D366; }
        .icon-purple { background: #f3e5f5; color: #9c27b0; }

        .card-text b { display: block; font-size: 16px; color: #222; margin-bottom: 3px; }
        .card-text span { font-size: 12px; color: #888; line-height: 1.4; }

        /* BADGES */
        .badge { position: absolute; top: 12px; right: 15px; font-size: 9px; font-weight: 800; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-fast { background: #eef4ff; color: var(--secondary); }
        .badge-vip { background: #fff8e1; color: #fbc02d; }
        .badge-live { background: #e8f9ef; color: #25D366; }

        /* PAGE UI */
        .page-view { display: none; background: var(--white); padding: 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        h3 { font-size: 18px; color: var(--secondary); margin-bottom: 25px; text-align: center; }
        label { display: block; font-size: 11px; font-weight: 700; color: #bbb; margin-bottom: 8px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 15px; border: 1.5px solid #f5f5f5; border-radius: 15px; margin-bottom: 15px; font-size: 14px; box-sizing: border-box; background: #fafafa; font-family: inherit; }
