<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Mart | Your Digital Pharmacy</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #78D1DA; --secondary: #3E6CB5; --bg: #f4f7f8; --white: #ffffff; --gold: #FFD700; }
        
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; color: #333; }
        header { background: var(--white); padding: 25px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-logo { width: 140px; height: auto; }
        
        .container { max-width: 450px; margin: 0 auto; padding: 20px; flex-grow: 1; width: 100%; box-sizing: border-box; }

        /* CARDS */
        .card { background: var(--white); border-radius: 24px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-decoration: none; color: inherit; }
        .card:active { transform: scale(0.98); }
        .card-icon { width: 45px; height: 45px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .icon-blue { background: #eef4ff; color: var(--secondary); }
        .icon-gold { background: #fff8e1; color: #fbc02d; }
        .icon-teal { background: #e0f7f9; color: #008b8b; }
        .icon-green { background: #e8f9ef; color: #25D366; }
        .icon-purple { background: #f3e5f5; color: #9c27b0; }
        .card-text b { display: block; font-size: 15px; color: #222; }
        .card-text span { font-size: 11px; color: #888; }

        /* FORMS */
        .form-section { display: none; background: var(--white); padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        h3 { font-size: 18px; color: var(--secondary); margin-bottom: 20px; text-align: center; }
        label { display: block; font-size: 11px; font-weight: 700; color: #aaa; margin-bottom: 8px; text-transform: uppercase; }
        .required::after { content: " *"; color: #ff4d4d; }
        input, select, textarea { width: 100%; padding: 14px; border: 1.5px solid #f0f0f0; border-radius: 12px; margin-bottom: 12px; font-size: 14px; box-sizing: border-box; background: #fafafa; font-family: inherit; }
        
        .med-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-add { background: none; border: 1.5px dashed var(--primary); color: var(--secondary); width: 100%; padding: 10px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-bottom: 15px; font-size: 12px; }
        
        .btn-main { background: var(--secondary); color: white; padding: 16px; width: 100%; border: none; border-radius: 15px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .btn-back { border: none; background: none; color: #94A3B8; font-weight: 600; margin-bottom: 15px; cursor: pointer; }

        /* HISTORY */
        .history-item { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; position: relative; text-align: left; }
        .history-status { font-size: 10px; font-weight: 800; color: var(--secondary); position: absolute; top: 15px; right: 15px; text-transform: uppercase; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); display: flex; justify-content: space-around; padding: 12px 0 25px 0; border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-link { text-align: center; text-decoration: none; color: #bbb; font-size: 10px; font-weight: 600; flex: 1; }
        .nav-link.active { color: var(--secondary); }
    </style>
</head>
<body>

<header><img src="image.png.png" alt="Health Mart Logo" class="header-logo"></header>

<div class="container">
    <div id="home-screen">
        <div class="card" onclick="showForm('order-form')">
            <div class="card-icon icon-blue"><i class="fas fa-shopping-basket"></i></div>
            <div class="card-text"><b>Buy Medicines</b><span>Fast checkout for your medicines</span></div>
        </div>
        <div class="card" onclick="showForm('sub-form')">
            <div class="card-icon icon-gold"><i class="fas fa-crown"></i></div>
            <div class="card-text"><b>Medicine Subscription</b><span>VIP: Free delivery & refills</span></div>
        </div>
        <div class="card" onclick="showForm('upload-form')">
            <div class="card-icon icon-teal"><i class="fas fa-camera"></i></div>
            <div class="card-text"><b>Send Prescription</b><span>Quick photo upload</span></div>
        </div>
        <div class="card" onclick="showForm('history-page')">
            <div class="card-icon icon-purple"><i class="fas fa-history"></i></div>
            <div class="card-text"><b>Order History</b><span>Check status of your orders</span></div>
        </div>
